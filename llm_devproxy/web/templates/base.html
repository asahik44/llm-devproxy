<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}llm-devproxy{% endblock %}</title>
    <style>
        :root {
            --bg: #0f1117;
            --bg-card: #1a1d27;
            --bg-hover: #22263a;
            --border: #2a2e3e;
            --text: #e1e4ed;
            --text-muted: #8b90a0;
            --accent: #6c8aff;
            --accent-dim: #4a5f99;
            --green: #4ade80;
            --yellow: #fbbf24;
            --red: #f87171;
            --orange: #fb923c;
            --radius: 8px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* ── Layout ── */
        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 240px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 20px 0;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }

        .sidebar-logo h1 {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.5px;
        }

        .sidebar-logo .version {
            font-size: 11px;
            color: var(--text-muted);
        }

        .nav-section {
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
        }

        .nav-item {
            display: block;
            padding: 8px 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            transition: all 0.15s;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text);
        }

        .nav-item.active {
            color: var(--accent);
            background: rgba(108, 138, 255, 0.1);
            border-right: 2px solid var(--accent);
        }

        .nav-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 999px;
            background: var(--red);
            color: white;
            font-size: 10px;
            font-weight: 700;
            margin-left: 6px;
        }

        .sidebar-stats {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            margin-top: auto;
            position: absolute;
            bottom: 0;
            width: 100%;
        }

        .sidebar-stat {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 4px 0;
        }

        .sidebar-stat .label { color: var(--text-muted); }
        .sidebar-stat .value { color: var(--text); font-weight: 600; }

        /* ── Main content ── */
        .main {
            flex: 1;
            padding: 24px 32px;
            min-width: 0;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .page-header h2 {
            font-size: 20px;
            font-weight: 600;
        }

        .page-header .count {
            font-size: 13px;
            color: var(--text-muted);
            margin-left: 8px;
        }

        /* ── Search / Filters ── */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filters input,
        .filters select {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: var(--radius);
            font-size: 13px;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.15s;
        }

        .filters input:focus,
        .filters select:focus {
            border-color: var(--accent);
        }

        .filters input[type="search"] {
            width: 300px;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: var(--radius);
            font-size: 13px;
            font-family: var(--font);
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn:hover { opacity: 0.85; }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        .btn-ghost:hover {
            border-color: var(--text-muted);
            color: var(--text);
        }

        /* ── Table ── */
        .table-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead th {
            text-align: left;
            padding: 10px 14px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        .sort-link {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.15s;
            cursor: pointer;
        }

        .sort-link:hover { color: var(--text); }
        .sort-link.active { color: var(--accent); }

        tbody td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        tbody tr:last-child td { border-bottom: none; }

        tbody tr:hover { background: var(--bg-hover); }

        tbody tr { cursor: pointer; transition: background 0.1s; }

        /* ── Badges ── */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-openai { background: rgba(16, 163, 127, 0.15); color: #10a37f; }
        .badge-anthropic { background: rgba(204, 148, 80, 0.15); color: #cc9450; }
        .badge-gemini { background: rgba(66, 133, 244, 0.15); color: #4285f4; }
        .badge-cached { background: rgba(74, 222, 128, 0.15); color: var(--green); }
        .badge-mock { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }

        .prompt-text {
            color: var(--text);
            font-size: 12px;
            line-height: 1.5;
            max-width: 400px;
        }

        .cost { font-family: var(--mono); font-size: 12px; }
        .cost-zero { color: var(--text-muted); }

        .tokens {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-muted);
        }

        .tokens-reasoning {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--orange);
        }

        .reasoning-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }

        .reasoning-bar-bg {
            flex: 1;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            max-width: 80px;
        }

        .reasoning-bar-fill {
            height: 100%;
            background: var(--orange);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .reasoning-pct {
            font-size: 10px;
            color: var(--orange);
            font-family: var(--mono);
            white-space: nowrap;
        }

        .badge-reasoning {
            background: rgba(251, 146, 60, 0.15);
            color: var(--orange);
        }

        .model-name {
            font-family: var(--mono);
            font-size: 12px;
        }

        .timestamp {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* ── Pagination ── */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 20px;
        }

        .pagination a,
        .pagination span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: var(--radius);
            font-size: 13px;
            text-decoration: none;
            color: var(--text-muted);
            transition: all 0.15s;
        }

        .pagination a:hover {
            background: var(--bg-hover);
            color: var(--text);
        }

        .pagination .current {
            background: var(--accent);
            color: white;
            font-weight: 600;
        }

        /* ── Detail page ── */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .detail-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
        }

        .detail-card h3 {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
        }

        .detail-row .label { color: var(--text-muted); }
        .detail-row .value { font-weight: 500; }

        .json-block {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-top: 16px;
            overflow-x: auto;
        }

        .json-block pre {
            font-family: var(--mono);
            font-size: 12px;
            line-height: 1.6;
            color: var(--text);
            white-space: pre-wrap;
            word-break: break-all;
        }

        .json-toggle {
            font-size: 12px;
            color: var(--accent);
            cursor: pointer;
            margin-top: 8px;
            display: inline-block;
        }

        .json-toggle:hover { text-decoration: underline; }

        /* ── Empty state ── */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: var(--text);
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { padding: 16px; }
            .filters input[type="search"] { width: 100%; }
            .detail-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h1>llm-devproxy</h1>
                <span class="version">v0.3.2</span>
            </div>

            <div class="nav-section">Navigation</div>
            <a href="/history" class="nav-item {% if page_name == 'history' %}active{% endif %}">
                📋 履歴
            </a>
            <a href="/costs" class="nav-item {% if page_name == 'costs' %}active{% endif %}">
                💰 コスト
            </a>
            <a href="/alerts" class="nav-item {% if page_name == 'alerts' %}active{% endif %}">
                🔔 アラート
                {% if unack_count is defined and unack_count > 0 %}
                <span class="nav-badge">{{ unack_count }}</span>
                {% endif %}
            </a>
            <a href="/sessions" class="nav-item {% if page_name == 'sessions' %}active{% endif %}">
                🔀 セッション比較
            </a>

            <div class="sidebar-stats">
                <div class="sidebar-stat">
                    <span class="label">Today's cost</span>
                    <span class="value">${{ "%.4f"|format(daily_cost) }}</span>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="main">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
